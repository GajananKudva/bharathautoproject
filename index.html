// ── Groq — works in both Electron (IPC) and browser (web server proxy) ────────
async function callGroq(messages, maxTokens = 1024, temperature = 0.7) {
  if (window.electronAPI) {
    // Desktop app: key is in main.js, never in renderer
    const result = await window.electronAPI.callGroq(messages, maxTokens, temperature);
    if (!result.success) throw new Error(result.error);
    return result.content;
  } else {
    // Phone/browser: key is in server.js on the PC, never sent to the phone
    const res = await fetch('/api/groq', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, maxTokens, temperature })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    return data.content;
  }
}

// ── TAB 1 — Ask Anything ──────────────────────────────────────────────────────
function AskTab() {
  const [msgs, setMsgs] = useState([{ role:"assistant", content:"Hi! I'm your Maruti Suzuki Arena knowledge assistant 👋\n\nAsk me anything about our cars — variants, features, mileage, comparisons, or which car fits a customer best!" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [listening, setListening] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);

  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Voice input not supported in this browser. Try Chrome."); return; }
    const rec = new SR();
    rec.lang = "en-IN";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    setListening(true);
    rec.start();
    rec.onresult = (e) => { setInput(prev => (prev ? prev + " " : "") + e.results[0][0].transcript); setListening(false); };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
  }

  async function send() {
    const t = input.trim(); if (!t || loading) return;
    setInput("");
    const next = [...msgs, { role:"user", content:t }];
    setMsgs(next); setLoading(true);
    try {
      const reply = await callGroq([{ role:"system", content:SYS }, ...next.map(m => ({ role:m.role, content:m.content }))], 1024);
      setMsgs(p => [...p, { role:"assistant", content:reply }]);
    } catch (e) { setMsgs(p => [...p, { role:"assistant", content:"❌ "+e.message }]); }
    finally { setLoading(false); }
  }

  const chips = ["Compare Swift ZXi and ZXi+", "Which cars have a sunroof?", "Best CNG option under ₹8L?", "Brezza vs Ertiga?"];
  return (
    <div className="tab-content">
      <Header title="Ask Anything" />
      <div style={{ flex:1, overflowY:"auto", background:"#EEF3FA" }}>
        {msgs.length === 1 && (
          <div className="px-4 pt-3 pb-1">
            <p className="section-label mb-2">Quick questions</p>
            <div className="flex flex-wrap gap-2">
              {chips.map(c => <button key={c} onClick={() => setInput(c)} style={{ fontSize:"12px", fontWeight:500, borderRadius:"100px", padding:"6px 13px", background:"white", border:"1.5px solid #D0DCF0", color:"#1B3A6B" }}>{c}</button>)}
            </div>
          </div>
        )}
        <div className="px-4 py-3 space-y-3">
          {msgs.map((m,i) => (
            <div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"} fade-up`}>
              <div style={{ maxWidth:"85%", background:m.role==="user"?"linear-gradient(135deg,#1B3A6B,#2E75B6)":"white", color:m.role==="user"?"white":"#1C2B3A", borderRadius:"18px", borderBottomRightRadius:m.role==="user"?"4px":"18px", borderBottomLeftRadius:m.role==="assistant"?"4px":"18px", padding:"10px 14px", fontSize:"13.5px", lineHeight:"1.65", whiteSpace:"pre-wrap", boxShadow:m.role==="assistant"?"0 1px 8px rgba(27,58,107,0.09)":"0 2px 10px rgba(27,58,107,0.22)", border:m.role==="assistant"?"1px solid rgba(27,58,107,0.07)":undefined }}>{m.content}</div>
            </div>
          ))}
          {loading && <TypingDots />}
          <div ref={endRef} />
        </div>
      </div>
      <div style={{ background:"white", borderTop:"1px solid #E4EBF5", padding:"10px 14px", flexShrink:0, display:"flex", gap:"8px", alignItems:"center" }}>
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==="Enter"&&send()} placeholder="Ask about any car or variant…" disabled={loading} style={{ flex:1, border:"1.5px solid #DDE6F2", borderRadius:"12px", padding:"10px 14px", fontSize:"13px", outline:"none", background:"#F5F8FD", color:"#1C2B3A" }} />
        <button onClick={startVoice} disabled={loading} title={listening?"Listening…":"Tap to speak"} style={{ background:listening?"#FEE2E2":"#F0F4FA", border:"1.5px solid #DDE6F2", borderRadius:"12px", padding:"10px 12px", fontSize:"18px", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, minWidth:"44px" }}>{listening?"🔴":"🎤"}</button>
        <button onClick={send} disabled={loading||!input.trim()} style={{ background:"#1B3A6B", color:"white", borderRadius:"12px", padding:"10px 16px", fontSize:"13px", fontWeight:600, border:"none", display:"flex", alignItems:"center", gap:"4px", opacity:loading||!input.trim()?0.4:1 }}>{loading?<Spinner small />:"Send"}</button>
      </div>
    </div>
  );
}

// ── TAB 2 — Quiz ──────────────────────────────────────────────────────────────
function QuizTab() {
  const [car, setCar] = useState("All Cars");
  const [diff, setDiff] = useState("Medium");
  const [phase, setPhase] = useState("idle");
  const [qs, setQs] = useState([]);
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [score, setScore] = useState(0);
  const [hist, setHist] = useState([]);
  const [errMsg, setErrMsg] = useState("");

  async function gen() {
    setPhase("loading"); setErrMsg("");
    const scope = car==="All Cars"?"all the Maruti Suzuki Arena cars":`the ${car}`;
    const categories = ["engine specs","mileage/fuel efficiency","variant upgrades & features","safety features & airbags","technology & infotainment","boot space & dimensions","transmission options","CNG availability & range","unique selling points","practical customer scenarios"];
    const picked = categories.sort(()=>Math.random()-0.5).slice(0,5);
    const p = `Generate exactly 5 multiple choice quiz questions for a car salesperson training about ${scope}.\nDifficulty: ${diff}\nEach question MUST cover a different topic from this list (one per question): ${picked.join(", ")}.\nSource:\n${CAR_DATA}\nRules:\n- Each of the 5 questions tests a DIFFERENT aspect listed above\n- No two questions should feel similar or overlap\n- Use specific numbers, variant names, and features from the source data\n- 4 options (A B C D), exactly one correct, plausible wrong answers\nReturn ONLY a valid JSON array (no extra text):\n[{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","explanation":"..."}]`;
    try {
      const raw = await callGroq([{ role:"user", content:p }], 2048, 0.9);
      const m = raw.match(/\[[\s\S]*\]/);
      if (!m) throw new Error("No JSON — please try again");
      const parsed = JSON.parse(m[0]);
      if (!Array.isArray(parsed)||parsed.length<3) throw new Error("Too few questions — retry");
      setQs(parsed); setCur(0); setSel(null); setScore(0); setHist([]); setPhase("active");
    } catch(e) { setErrMsg(e.message); setPhase("idle"); }
  }

  function pick(opt) {
    if (sel) return;
    const ok = opt===qs[cur].answer;
    setSel(opt); if (ok) setScore(s=>s+1);
    setHist(h=>[...h,{ok,sel:opt}]);
  }
  function next() { if (cur+1>=qs.length){setPhase("done");return;} setCur(c=>c+1); setSel(null); }
  const scoreMsg = ["Don't give up! 💡","Keep going! 📚","Good effort! 💪","Getting there!","Great job! 🚀","Perfect! 🏆"];

  if (phase==="loading") return <div className="tab-content"><Header title="Quiz Me" /><div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"16px" }}><div className="spin w-12 h-12 border-4 rounded-full" style={{ borderColor:"#2E75B6", borderTopColor:"transparent" }} /><p className="font-medium" style={{ color:"#1B3A6B" }}>Generating quiz…</p></div></div>;

  if (phase==="done") return (
    <div className="tab-content"><Header title="Quiz Results" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-5">
        <div className="rounded-2xl p-5 text-white text-center mb-5" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
          <div className="text-5xl mb-2">{score===qs.length?"🏆":score>=3?"🚀":"📚"}</div>
          <div className="text-4xl font-bold">{score}/{qs.length}</div>
          <p className="text-sm mt-2 text-blue-100">{scoreMsg[Math.min(score,scoreMsg.length-1)]}</p>
        </div>
        <div className="space-y-3 mb-5">
          {qs.map((q,i) => (
            <div key={i} className={`rounded-xl p-3 border ${hist[i]?.ok?"bg-green-50 border-green-200":"bg-red-50 border-red-200"}`}>
              <div className="flex gap-2"><span>{hist[i]?.ok?"✅":"❌"}</span>
                <div><p className="text-xs font-semibold text-gray-700 mb-1">Q{i+1}: {q.question}</p>
                  {!hist[i]?.ok && <p className="text-xs text-red-600 mb-0.5">Your: {hist[i]?.sel}: {q.options[hist[i]?.sel]}</p>}
                  <p className="text-xs text-green-700">Correct: {q.answer}: {q.options[q.answer]}</p>
                  <p className="text-xs text-gray-400 mt-1 italic">{q.explanation}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
        <button onClick={() => setPhase("idle")} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>Try Another Quiz</button>
      </div>
    </div>
  );

  if (phase==="active") {
    const q = qs[cur];
    return (
      <div className="tab-content"><Header title="Quiz Me" />
        <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
          <div className="flex justify-between mb-2"><span className="text-xs text-gray-500">Q {cur+1}/{qs.length}</span><span className="text-xs font-bold" style={{ color:"#1B3A6B" }}>Score: {score}</span></div>
          <div className="h-2 bg-gray-100 rounded-full mb-3 overflow-hidden"><div className="h-2 rounded-full" style={{ width:`${(cur+1)/qs.length*100}%`, background:"#2E75B6" }} /></div>
          <div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-100"><p className="text-gray-800 font-semibold text-sm leading-relaxed">{q.question}</p></div>
          <div className="space-y-2.5 mb-4">
            {Object.entries(q.options).map(([lt,txt]) => {
              let bg="white",border="#e5e7eb",color="#374151";
              if (sel) { if(lt===q.answer){bg="#f0fdf4";border="#4ade80";color="#166534";}else if(lt===sel){bg="#fef2f2";border="#f87171";color="#991b1b";}else{bg="#f9fafb";color="#9ca3af";} }
              return <button key={lt} onClick={()=>pick(lt)} disabled={!!sel} className="w-full text-left rounded-xl px-4 py-3 text-sm flex items-center gap-3" style={{ background:bg, border:`1.5px solid ${border}`, color }}><span className="w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ borderColor:color }}>{lt}</span>{txt}</button>;
            })}
          </div>
          {sel && <div className={`rounded-xl p-3 mb-4 ${sel===q.answer?"bg-green-50 border border-green-200":"bg-amber-50 border border-amber-200"}`}><p className="text-xs font-semibold mb-1">{sel===q.answer?"✅ Correct!":"❌ Incorrect — Answer: "+q.answer}</p><p className="text-xs text-gray-600">{q.explanation}</p></div>}
          {sel && <button onClick={next} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>{cur+1>=qs.length?"See Results →":"Next →"}</button>}
        </div>
      </div>
    );
  }

  return (
    <div className="tab-content"><Header title="Quiz Me" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-5">
        <div className="text-center mb-5"><div className="text-4xl mb-1">🧠</div><h2 className="text-xl font-bold" style={{ color:"#1B3A6B" }}>Test Your Knowledge</h2><p className="text-gray-500 text-sm mt-1">5 MCQs from live car data</p></div>
        <div className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm space-y-4 mb-4">
          <div><label className="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Select Car</label>
            <select value={car} onChange={e=>setCar(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none">
              {["All Cars",...CAR_NAMES].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label className="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Difficulty</label>
            <div className="flex gap-2">
              {["Easy","Medium","Hard"].map(d=><button key={d} onClick={()=>setDiff(d)} className="flex-1 py-2.5 rounded-xl text-sm font-semibold border" style={diff===d?{background:d==="Easy"?"#22c55e":d==="Medium"?"#eab308":"#ef4444",color:"white",border:"none"}:{background:"#f9fafb",color:"#6b7280",border:"1.5px solid #e5e7eb"}}>{d}</button>)}
            </div>
          </div>
        </div>
        {errMsg && <div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700">{errMsg}</div>}
        <button onClick={gen} className="w-full text-white py-4 rounded-xl font-bold text-base shadow-md" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>Generate Quiz 🎯</button>
      </div>
    </div>
  );
}

// ── TAB 3 — Roleplay ──────────────────────────────────────────────────────────
const PROFILES = [
  { icon:"👨‍👩‍👧", title:"Family of 4",      desc:"Budget ₹8–10L, city use, wants automatic" },
  { icon:"🏍️",  title:"Young Professional", desc:"First car, budget ₹5–7L, wants good mileage" },
  { icon:"🚗",  title:"Cab / Commercial",   desc:"High daily km, CNG preferred, budget ₹10–12L" },
  { icon:"🏔️",  title:"SUV Lover",          desc:"Family weekend trips, budget ₹12–15L, premium" },
];
function RoleplayTab() {
  const [stage, setStage] = useState("select");
  const [profile, setProfile] = useState("");
  const [custom, setCustom] = useState("");
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [fbLoading, setFbLoading] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [exchanges, setExchanges] = useState(0);
  const sysRef = useRef("");
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);

  async function start(p) {
    setProfile(p); setMsgs([]); setExchanges(0); setFeedback(null); setStage("chat"); setLoading(true);
    const sys = `You are roleplaying as a car customer at Bharath Auto (Maruti Suzuki Arena).\nCustomer: ${p}\nRules: stay in character, ask realistic questions, raise objections, react to the salesperson. Keep replies under 3 sentences. Do NOT suggest cars yourself.\nCar data:\n${CAR_DATA}`;
    sysRef.current = sys;
    try {
      const reply = await callGroq([{ role:"system",content:sys },{ role:"user",content:"Start the roleplay now. Greet the salesperson." }], 400, 0.85);
      setMsgs([{ role:"customer", content:reply }]);
    } catch(e) { setMsgs([{ role:"customer", content:"Error: "+e.message }]); }
    setLoading(false);
  }

  async function send() {
    const t = input.trim(); if (!t||loading) return;
    setInput("");
    const next = [...msgs, { role:"salesperson", content:t }];
    setMsgs(next); setExchanges(x=>x+1); setLoading(true);
    try {
      const apiMsgs = [{ role:"system",content:sysRef.current }, ...next.map(m=>({ role:m.role==="salesperson"?"user":"assistant", content:m.content }))];
      const reply = await callGroq(apiMsgs, 400, 0.85);
      setMsgs(p=>[...p,{ role:"customer", content:reply }]);
    } catch(e) { setMsgs(p=>[...p,{ role:"customer", content:"Error: "+e.message }]); }
    setLoading(false);
  }

  async function getFeedback() {
    setFbLoading(true);
    const conv = msgs.map(m=>`${m.role==="salesperson"?"SALESPERSON":"CUSTOMER"}: ${m.content}`).join("\n\n");
    const p = `Senior Maruti sales trainer evaluating this roleplay.\nCustomer: ${profile}\nConversation:\n${conv}\nCar Data:\n${CAR_DATA}\nReturn ONLY JSON:\n{"strengths":["..."],"missed":["..."],"probing_questions":["..."],"recommendation":{"car":"...","variant":"...","reason":"..."},"overall_score":7,"summary":"..."}`;
    try {
      const raw = await callGroq([{ role:"user",content:p }], 1500, 0.4);
      const m = raw.match(/\{[\s\S]*\}/);
      setFeedback(m?JSON.parse(m[0]):{error:"Could not parse feedback"});
    } catch(e) { setFeedback({error:e.message}); }
    setFbLoading(false); setStage("feedback");
  }

  if (stage==="feedback") return (
    <div className="tab-content"><Header title="Session Feedback" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        {feedback?.error ? <div className="bg-red-50 rounded-xl p-4 text-red-700 text-sm mb-4">{feedback.error}</div> : feedback && <>
          <div className="rounded-2xl p-4 text-white mb-4" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
            <div className="flex justify-between items-center mb-1"><span className="text-sm font-semibold">Overall Score</span><span className="text-3xl font-bold">{feedback.overall_score}<span className="text-lg text-blue-200">/10</span></span></div>
            <p className="text-blue-100 text-xs">{feedback.summary}</p>
          </div>
          <div className="space-y-3">
            <div className="bg-green-50 border border-green-200 rounded-2xl p-4"><p className="text-green-800 font-semibold text-sm mb-2">✅ What You Did Well</p>{feedback.strengths?.map((s,i)=><p key={i} className="text-green-700 text-xs mb-1">• {s}</p>)}</div>
            <div className="bg-red-50 border border-red-200 rounded-2xl p-4"><p className="text-red-800 font-semibold text-sm mb-2">⚠️ What You Missed</p>{feedback.missed?.map((s,i)=><p key={i} className="text-red-700 text-xs mb-1">• {s}</p>)}</div>
            <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4"><p className="text-blue-800 font-semibold text-sm mb-2">💬 Questions You Should Have Asked</p>{feedback.probing_questions?.map((s,i)=><p key={i} className="text-blue-700 text-xs mb-1">{i+1}. "{s}"</p>)}</div>

// ── TAB 4 — Match a Customer ──────────────────────────────────────────────────
function MatchTab() {
  const [form, setForm] = useState({ budget:"₹8–10L", family:"3–4", use:"City commute", fuel:"No preference", tx:"No preference", feature:"" });
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [err, setErr] = useState("");

  const Chips = ({ label, field, opts }) => (
    <div>
      <p className="section-label">{label}</p>
      <div className="flex flex-wrap gap-1.5">
        {opts.map(o=><button key={o} onClick={()=>setForm(f=>({...f,[field]:o}))} style={form[field]===o?{fontSize:"12px",fontWeight:600,borderRadius:"100px",padding:"5px 14px",background:"#1B3A6B",color:"white",border:"1.5px solid #1B3A6B"}:{fontSize:"12px",fontWeight:500,borderRadius:"100px",padding:"5px 14px",background:"white",color:"#374151",border:"1.5px solid #DDE5EF"}}>{o}</button>)}
      </div>
    </div>
  );

  async function find() {
    setLoading(true); setErr(""); setResults(null);
    const p = `Match best Maruti Suzuki Arena cars.\nCustomer: Budget ${form.budget}, Family ${form.family}, Use: ${form.use}, Fuel: ${form.fuel}, Transmission: ${form.tx}, Must-have: ${form.feature||"none"}\nCars:\n${CAR_DATA}\nReturn ONLY JSON:\n{"recommendations":[{"car":"...","variant":"...","reasons":["...","...","..."],"match_score":90,"price_range":"₹X–Y lakh approx"}],"alternative":{"car":"...","variant":"...","reason":"..."},"sales_tip":"..."}`;
    try {
      const raw = await callGroq([{ role:"user",content:p }], 1500, 0.4);
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("Could not parse — retry");
      setResults(JSON.parse(m[0]));
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }

  if (results) return (
    <div className="tab-content"><Header title="Match a Customer" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        <div className="flex items-center justify-between mb-3"><h2 className="text-base font-bold" style={{ color:"#1B3A6B" }}>Recommended Cars</h2><button onClick={()=>setResults(null)} className="text-xs font-medium" style={{ color:"#2E75B6" }}>← New Search</button></div>
        <div className="space-y-3 mb-3">
          {results.recommendations?.map((r,i)=>(
            <div key={i} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
              <div className="flex items-start justify-between mb-2">
                <div><div className="flex items-center gap-2 mb-1"><span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background:i===0?"#1B3A6B":"#f3f4f6", color:i===0?"white":"#4b5563" }}>#{i+1} {i===0?"Best Match":"Good Fit"}</span>{r.match_score&&<span className="text-xs font-semibold text-green-600">{r.match_score}%</span>}</div>
                  <h3 className="text-base font-bold" style={{ color:"#1B3A6B" }}>{r.car}</h3><p className="text-sm font-medium" style={{ color:"#2E75B6" }}>{r.variant}</p>
                </div><span className="text-2xl">{i===0?"🥇":i===1?"🥈":"🥉"}</span>
              </div>
              {r.price_range&&<p className="text-xs text-gray-500 bg-gray-50 px-2 py-1 rounded-lg inline-block mb-2">{r.price_range}</p>}
              <div className="space-y-1.5">{r.reasons?.map((rr,j)=><p key={j} className="text-xs text-gray-700 flex gap-2"><span className="text-green-500 font-bold">✓</span>{rr}</p>)}</div>
            </div>
          ))}
        </div>
        {results.alternative&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-3"><p className="text-amber-800 font-semibold text-sm mb-1">💡 Alternative</p><p className="text-amber-700 text-sm font-medium">{results.alternative.car} — {results.alternative.variant}</p><p className="text-amber-600 text-xs mt-1">{results.alternative.reason}</p></div>}
        {results.sales_tip&&<div className="rounded-2xl p-4 mb-4" style={{ background:"#1B3A6B" }}><p className="text-blue-200 text-xs font-semibold mb-1">🎯 SALES TIP</p><p className="text-white text-sm">{results.sales_tip}</p></div>}
        <button onClick={()=>setResults(null)} className="w-full py-3 rounded-xl font-semibold text-sm border-2" style={{ borderColor:"#1B3A6B", color:"#1B3A6B", background:"transparent" }}>Search Again</button>
      </div>
    </div>
  );

  return (
    <div className="tab-content"><Header title="Match a Customer" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        <div className="text-center mb-4"><div className="text-3xl mb-1">🎯</div><h2 className="text-lg font-bold" style={{ color:"#1B3A6B" }}>Find the Perfect Car</h2><p className="text-gray-500 text-xs mt-1">AI-matched recommendations in seconds</p></div>
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-4 mb-4">
          <Chips label="Budget Range" field="budget" opts={["Under ₹6L","₹6–8L","₹8–10L","₹10–12L","₹12–15L","Above ₹15L"]} />
          <Chips label="Family Size" field="family" opts={["1–2","3–4","5+","Commercial use"]} />
          <Chips label="Primary Use" field="use" opts={["City commute","Highway","Mixed","Off-road/hills"]} />
          <Chips label="Fuel Preference" field="fuel" opts={["Petrol","CNG","No preference"]} />
          <Chips label="Transmission" field="tx" opts={["Manual","Automatic","No preference"]} />
          <div><p className="text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Must-Have Feature (optional)</p>
            <input value={form.feature} onChange={e=>setForm(f=>({...f,feature:e.target.value}))} placeholder="e.g. sunroof, Apple CarPlay, 7 seats…" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none bg-gray-50" />
          </div>
        </div>
        {err&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700">{err}</div>}
        <button onClick={find} disabled={loading} className="w-full text-white py-4 rounded-xl font-bold text-base shadow-md flex items-center justify-center gap-2 disabled:opacity-60" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>{loading?<><Spinner />Finding Best Match…</>:"Find Best Match 🎯"}</button>
      </div>
    </div>
  );
}

function CompareTab() {
  const [mode, setMode] = useState("own"); // "own" | "vs" | "variant"
  // own mode
  const [car1, setCar1] = useState("Swift");
  const [car2, setCar2] = useState("Dzire");
  const [showAI, setShowAI] = useState(false);
  const [aiText, setAiText] = useState("");
  const [loadingAI, setLoadingAI] = useState(false);
  // competition mode
  const [matchup, setMatchup] = useState(COMPETITION_KEYS[0]);
  // variant mode
  const [varCar, setVarCar] = useState("Swift");
  const [var1, setVar1] = useState(0);
  const [var2, setVar2] = useState(1);

  const c1 = CARS_STRUCTURED[car1];
  const c2 = CARS_STRUCTURED[car2];

  async function getAIAnalysis() {
    setLoadingAI(true); setShowAI(true); setAiText("");
    const p = `Compare ${car1} and ${car2} for a Maruti Suzuki Arena salesperson.\nCar data:\n${CAR_DATA}\nGive a concise comparison in 4-5 bullet points: who each car is best for, key differences, and which to recommend to which type of customer. Keep it practical for a sales floor conversation.`;
    try {
      const reply = await callGroq([{ role:"user", content:p }], 600, 0.6);
      setAiText(reply);
    } catch(e) { setAiText("Error: "+e.message); }
    setLoadingAI(false);
  }

  const sameCarSelected = car1 === car2;
  const currentMatchup = COMPETITION_MATCHUPS[matchup];
  const variantData = VARIANT_FEATURES[varCar];
  const variantNames = variantData ? variantData.variants : [];
  const v1name = variantNames[var1] || "";
  const v2name = variantNames[var2] || "";

  const MODE_TABS = [
    { id:"own",     label:"Maruti vs Maruti" },
    { id:"vs",      label:"vs Competition"   },
    { id:"variant", label:"Variant Compare"  },
  ];

  return (
    <div className="tab-content">
      <Header title="Compare" />
      <div style={{ flex:1, overflowY:"auto", background:"#EEF3FA" }} className="px-3 py-3">

        {/* Mode tabs */}
        <div className="flex rounded-xl overflow-hidden border border-gray-200 mb-4" style={{ background:"white" }}>
          {MODE_TABS.map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)}
              className="flex-1 text-xs font-semibold py-2.5 transition-all"
              style={{ background: mode===m.id ? "#1B3A6B" : "white", color: mode===m.id ? "white" : "#6B7280" }}>
              {m.label}
            </button>
          ))}
        </div>

        {/* ── OWN MODE ── */}
        {mode==="own" && (
          <>
            <div className="grid grid-cols-2 gap-3 mb-4">
              {[[car1,setCar1,"Car 1"],[car2,setCar2,"Car 2"]].map(([val,setter,label])=>(
                <div key={label}>
                  <p className="text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">{label}</p>
                  <select value={val} onChange={e=>{ setter(e.target.value); setShowAI(false); setAiText(""); }}
                    className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none font-semibold" style={{ color:"#1B3A6B" }}>
                    {CAR_NAMES.map(n=><option key={n}>{n}</option>)}
                  </select>
                </div>
              ))}
            </div>

            {sameCarSelected && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-xs text-amber-700 text-center">Select two different cars to compare</div>
            )}

            {!sameCarSelected && (
              <>
                <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-3">
                  <div className="grid grid-cols-3 border-b border-gray-100">
                    <div className="p-3 bg-gray-50" />
                    {[{name:car1},{name:car2}].map(({name})=>(
                      <div key={name} className="p-3 text-center border-l border-gray-100" style={{ background:"#eef2f9" }}>
                        <p className="text-xs font-bold" style={{ color:"#1B3A6B" }}>{name}</p>
                      </div>
                    ))}
                  </div>
                  <table className="cmp-table">
                    <tbody>
                      {SPEC_ROWS.map(row => {
                        const v1 = c1[row.key] || "—";
                        const v2 = c2[row.key] || "—";
                        const diff = v1 !== v2;
                        return (
                          <tr key={row.key}>
                            <th>{row.label}</th>
                            <td className={`cmp-cell ${diff?"cmp-diff":""}`} style={{ color:"#1f2937" }}>{v1}</td>
                            <td className={`cmp-cell ${diff?"cmp-diff":""} border-l border-gray-50`} style={{ color:"#1f2937" }}>{v2}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div className="px-3 pb-2 pt-1">
                    <p className="text-[10px] text-amber-600">🟡 Highlighted rows = values differ</p>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-4">
                  {[{name:car1,data:c1},{name:car2,data:c2}].map(({name,data})=>(
                    <div key={name} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-3">
                      <p className="text-xs font-bold mb-2" style={{ color:"#1B3A6B" }}>⭐ {name}</p>
                      <p className="text-xs text-gray-600 leading-relaxed">{data.topFeatures}</p>
                    </div>
                  ))}
                </div>

                {!showAI ? (
                  <button onClick={getAIAnalysis} className="w-full text-white py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
                    🤖 Get AI Sales Analysis
                  </button>
                ) : (
                  <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                    <p className="text-xs font-bold mb-2" style={{ color:"#1B3A6B" }}>🤖 AI Analysis — {car1} vs {car2}</p>
                    {loadingAI
                      ? <div className="flex items-center gap-2 py-2"><Spinner small /><span className="text-xs text-gray-500">Analyzing…</span></div>
                      : <p className="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap">{aiText}</p>
                    }
                    <button onClick={()=>{setShowAI(false);setAiText("");}} className="mt-3 text-xs text-gray-400 underline">Dismiss</button>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── COMPETITION MODE ── */}
        {mode==="vs" && (
          <>
            <div className="mb-4">
              <p className="text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Select Matchup</p>
              <select value={matchup} onChange={e=>setMatchup(e.target.value)}

            </div>

            {/* Header badges */}

              <div className="rounded-2xl p-3 text-center" style={{ background:"#1B3A6B" }}>
                <p className="text-white text-xs font-bold">{currentMatchup.marutiCar}</p>
                <p className="text-blue-200 text-[10px] mt-0.5">{currentMatchup.marutiVariant}</p>
              </div>
              <div className="rounded-2xl p-3 text-center" style={{ background:"#6B7280" }}>
                <p className="text-white text-xs font-bold">{currentMatchup.rivalCar}</p>
                <p className="text-gray-300 text-[10px] mt-0.5">{currentMatchup.rivalVariant}</p>
              </div>
            </div>

            {/* Comparison table */}

              <div className="grid grid-cols-3 border-b border-gray-100 bg-gray-50">

                <div className="p-2 text-center border-l border-gray-100"><p className="text-[10px] font-bold uppercase tracking-wide" style={{ color:"#1B3A6B" }}>{currentMatchup.marutiCar}</p></div>
                <div className="p-2 text-center border-l border-gray-100"><p className="text-[10px] font-bold text-gray-500 uppercase tracking-wide">{currentMatchup.rivalCar}</p></div>
              </div>
              {currentMatchup.rows.map((row,i)=>{
                const marutiVal = row.maruti === true ? "✅" : row.maruti === false ? "—" : row.maruti;
                const rivalVal  = row.rival  === true ? "✅" : row.rival  === false ? "❌" : row.rival;
                const marutiWins = row.maruti===true && row.rival===false || row.marutiBetter;
                return (
                  <div key={i} className={`grid grid-cols-3 border-b border-gray-50 ${marutiWins?"":"opacity-90"}`}>
                    <div className="p-2 bg-gray-50"><p className="text-[11px] text-gray-700 leading-tight">{row.feature}</p></div>
                    <div className={`p-2 text-center border-l border-gray-100 ${marutiWins ? "bg-green-50":""}`}>
                      <p className={`text-xs font-semibold ${marutiWins?"text-green-700":"text-gray-600"}`}>{marutiVal}</p>
                    </div>
                    <div className="p-2 text-center border-l border-gray-100">
                      <p className={`text-xs ${!marutiWins && row.rival!==false?"font-semibold text-gray-700":"text-red-400"}`}>{rivalVal}</p>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Sales pitch banner */}
            <div className="rounded-2xl p-3 mb-2" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
              <p className="text-white text-xs font-bold mb-1">💡 Sales Pitch</p>

                    return (
                      <div key={feat} className="grid grid-cols-3 border-b border-gray-50" style={{ background:rowColor }}>
                        <div className="p-2 bg-gray-50"><p className="text-[11px] text-gray-700 leading-tight">{feat}</p></div>
                        <div className="p-2 text-center border-l border-gray-100">
                          <span className={`text-sm ${has1?"text-green-600":"text-gray-300"}`}>{has1?"✅":"—"}</span>
                        </div>
                        <div className="p-2 text-center border-l border-gray-100">
                          <span className={`text-sm ${has2?"text-green-600":"text-gray-300"}`}>{has2?"✅":"—"}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 text-[10px] text-blue-700">
                  🟡 Yellow rows = features that differ between the two variants. Use this to explain upgrade value to customers.
                </div>
              </>
            )}
          </>
        )}

      </div>
    </div>
  );
}

// ── TAB 6 — Feature Flashcards ────────────────────────────────────────────────
function FlashcardsTab() {
  const [selectedCar, setSelectedCar] = useState("Swift");
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [review, setReview] = useState(new Set());
  const [phase, setPhase] = useState("study"); // study | summary

  const deck = FLASHCARD_DECKS[selectedCar] || [];
  const card = deck[cardIdx];
  const total = deck.length;
  const knownCount = known.size;
  const reviewCount = review.size;

  function changeCar(c) {
    setSelectedCar(c);
    setCardIdx(0);
    setFlipped(false);
    setKnown(new Set());
    setReview(new Set());
    setPhase("study");
  }

  function markKnown() {
    setKnown(s => new Set([...s, cardIdx]));
    review.has(cardIdx) && setReview(s => { const n=new Set(s); n.delete(cardIdx); return n; });
    advance();
  }

  function markReview() {
    setReview(s => new Set([...s, cardIdx]));
    known.has(cardIdx) && setKnown(s => { const n=new Set(s); n.delete(cardIdx); return n; });
    advance();
  }

  function advance() {
    setFlipped(false);
    setTimeout(() => {
      if (cardIdx + 1 >= total) { setPhase("summary"); }
      else { setCardIdx(i => i+1); }
    }, 200);
  }

  function restart(reviewOnly=false) {
    if (reviewOnly && review.size > 0) {
      // rebuild deck with only review cards — for simplicity, just go to first review card
      const firstReview = [...review].sort((a,b)=>a-b)[0];
      setCardIdx(firstReview);
    } else {
      setCardIdx(0);
    }
    setFlipped(false);
    setKnown(new Set());
    setReview(new Set());
    setPhase("study");
  }

  if (phase==="summary") return (
    <div className="tab-content"><Header title="Flashcards" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-6">
        <div className="rounded-2xl p-5 text-white text-center mb-5" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
          <div className="text-5xl mb-2">{knownCount===total?"🏆":knownCount>=total*0.7?"🎉":"📖"}</div>
          <p className="text-blue-200 text-sm mb-1">{selectedCar} Flashcards</p>
          <div className="flex justify-center gap-6 mt-3">
            <div className="text-center"><p className="text-2xl font-bold text-green-300">{knownCount}</p><p className="text-xs text-blue-200">Got it ✓</p></div>
            <div className="text-center"><p className="text-2xl font-bold text-amber-300">{reviewCount}</p><p className="text-xs text-blue-200">Review again</p></div>
          </div>
          <p className="text-blue-100 text-sm mt-3">{knownCount===total?"Perfect! You know this car cold 🔥":knownCount>=total*0.7?"Great progress! Review the remaining cards":"Keep practising — you'll get there!"}</p>
        </div>
        <div className="space-y-3 mb-5">
          <button onClick={()=>restart(false)} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>Restart Deck</button>
          {reviewCount > 0 && <button onClick={()=>restart(true)} className="w-full py-3 rounded-xl font-semibold text-sm border-2" style={{ borderColor:"#1B3A6B", color:"#1B3A6B" }}>Drill {reviewCount} Review Cards</button>}
          <button onClick={()=>changeCar(selectedCar)} className="w-full py-3 rounded-xl font-semibold text-sm border border-gray-200 text-gray-500">Pick Another Car</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="tab-content">
      <Header title="Feature Flashcards" />
      <div style={{ flex:1, overflowY:"auto", background:"#f9fafb" }} className="px-4 py-4">

        {/* Car picker */}
        <div className="mb-4">
          <select value={selectedCar} onChange={e=>changeCar(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none font-semibold" style={{ color:"#1B3A6B" }}>
            {CAR_NAMES.map(n=><option key={n}>{n}</option>)}
          </select>
        </div>

        {/* Progress bar */}
        <div className="flex items-center justify-between mb-1.5">
          <span className="text-xs text-gray-500 font-medium">Card {cardIdx+1} of {total}</span>
          <div className="flex gap-2 text-xs">
            <span className="text-green-600 font-semibold">✓ {knownCount}</span>
            <span className="text-amber-500 font-semibold">↺ {reviewCount}</span>
          </div>
        </div>
        <div className="h-2 bg-gray-200 rounded-full mb-4 overflow-hidden">
          <div className="h-2 rounded-full transition-all" style={{ width:`${(cardIdx+1)/total*100}%`, background:"linear-gradient(to right, #22c55e, #2E75B6)" }} />
        </div>

        {/* Flip card */}
        <div className="flip-scene mb-4" onClick={()=>setFlipped(f=>!f)}>
          <div className={`flip-card ${flipped?"flipped":""}`}>
            {/* Front */}
            <div className="flip-face flip-front">
              <p className="text-[10px] text-gray-400 font-semibold uppercase tracking-widest mb-3">Tap to reveal answer</p>
              <p className="text-gray-800 font-semibold text-base text-center leading-relaxed">{card?.q}</p>
            </div>
            {/* Back */}
            <div className="flip-face flip-back">
              <p className="text-[10px] text-blue-300 font-semibold uppercase tracking-widest mb-3">Answer</p>
              <p className="text-white font-bold text-lg text-center leading-relaxed">{card?.a}</p>
            </div>
          </div>
        </div>

        <p className="text-center text-xs text-gray-400 mb-4">{flipped?"How well did you know this?":"Tap the card to reveal the answer"}</p>

        {/* Action buttons — only show after flip */}
        {flipped && (
          <div className="grid grid-cols-2 gap-3">
            <button onClick={markReview} className="py-3 rounded-xl font-semibold text-sm border-2 flex items-center justify-center gap-2" style={{ borderColor:"#f59e0b", color:"#b45309", background:"#fffbeb" }}>
              ↺ Review Again
            </button>
            <button onClick={markKnown} className="py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 text-white" style={{ background:"#16a34a" }}>
              ✓ Got It!
            </button>
          </div>
        )}

        {/* Card dots navigator */}
        <div className="flex justify-center gap-1 mt-4 flex-wrap">
          {deck.map((_,i) => (
            <div key={i} onClick={()=>{setCardIdx(i);setFlipped(false);}} className="w-2.5 h-2.5 rounded-full cursor-pointer transition-all"
              style={{ background: known.has(i)?"#22c55e":review.has(i)?"#f59e0b":i===cardIdx?"#1B3A6B":"#d1d5db" }} />
          ))}
        </div>
        <p className="text-center mt-1.5 text-[10px] text-gray-400">🟢 Known · 🟡 Review · 🔵 Current · ⚪ Unseen</p>
      </div>
    </div>
  );
}

// ── TAB 7 — Objection Handler ─────────────────────────────────────────────
function ObjectionTab() {
  const [custom, setCustom] = useState("");
  const [reply, setReply] = useState("");
  const [loading, setLoading] = useState(false);
  const [active, setActive] = useState("");

  const OBJECTIONS = [
    "It's too expensive",
    "I want a diesel car",
    "Hyundai has more features",
    "Tata cars are safer",
    "Can you give more discount?",
    "The mileage figures seem fake",
    "Boot space is too small",
    "I need a 7-seater",
    "The design looks too plain",
    "Maruti service is expensive",
    "Automatic is too costly",
    "I'll wait for the new model",
  ];

  async function handle(obj) {
    setActive(obj); setReply(""); setLoading(true);
    const p = `You are a senior Maruti Suzuki Arena sales trainer coaching a salesperson.\nA customer just said: "${obj}"\n\nUsing this real product data:\n${CAR_DATA}\n\nWrite a confident, natural rebuttal the salesperson can say immediately. Structure:\n1. One sentence acknowledging the concern (don't be defensive)\n2. Two or three factual counter-points using specific data from the car specs above\n3. One sentence redirecting to a specific Maruti model/variant that best addresses the concern\n\nKeep it concise (under 120 words), conversational, and persuasive. No bullet points — write as flowing speech.`;
    try {
      const r = await callGroq([{ role:"user", content:p }], 600, 0.75);
      setReply(r);
    } catch(e) { setReply("❌ " + e.message); }
    finally { setLoading(false); }
  }

  return (
    <div className="tab-content">
      <Header title="Objection Handler" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-3">Tap an objection — get your rebuttal instantly</p>
        <div className="flex flex-wrap gap-2 mb-4">
          {OBJECTIONS.map(o => (
            <button key={o} onClick={() => handle(o)}
              className="text-xs rounded-full px-3 py-1.5 border font-medium"
              style={{ background:active===o?"#1B3A6B":"white", color:active===o?"white":"#1B3A6B", borderColor:"#1B3A6B" }}>
              {o}
            </button>
          ))}
        </div>
        <div className="flex gap-2 mb-5">
          <input value={custom} onChange={e=>setCustom(e.target.value)} onKeyDown={e=>e.key==="Enter"&&custom.trim()&&handle(custom.trim())} placeholder="Or type a custom objection…" className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none bg-gray-50" />
          <button onClick={()=>custom.trim()&&handle(custom.trim())} disabled={!custom.trim()||loading} className="text-white rounded-xl px-4 py-2.5 text-sm font-medium disabled:opacity-40" style={{ background:"#1B3A6B" }}>Go</button>
        </div>
        {loading && (
          <div className="flex items-center gap-3 py-8 justify-center">
            <div className="spin w-6 h-6 border-2 rounded-full" style={{ borderColor:"#2E75B6", borderTopColor:"transparent" }} />
            <p className="text-sm text-gray-500">Crafting your rebuttal…</p>
          </div>
        )}
        {reply && !loading && (
          <div className="bg-white rounded-2xl p-4 border border-gray-100" style={{ boxShadow:"0 1px 6px rgba(0,0,0,0.07)" }}>
            <div className="flex items-center gap-2 mb-3">
              <span className="text-xl">🛡️</span>
              <p className="text-xs font-bold uppercase tracking-wide" style={{ color:"#1B3A6B" }}>Rebuttal for: "{active}"</p>
            </div>
            <p className="text-sm text-gray-700 leading-relaxed">{reply}</p>
            <button onClick={()=>handle(active)} className="mt-3 text-xs font-medium" style={{ color:"#2E75B6", background:"none", border:"none", cursor:"pointer", padding:0 }}>↻ Regenerate</button>
          </div>
        )}
        {!loading && !reply && (
          <div className="text-center py-10">
            <div className="text-5xl mb-3">🛡️</div>
            <p className="text-gray-500 text-sm font-medium">Tap any objection above</p>
            <p className="text-gray-400 text-xs mt-1">Get a data-backed, natural rebuttal in seconds</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Bottom Nav (7 tabs) ────────────────────────────────────────────────────
const TABS = [
  { id:"ask",        icon:"🔍", label:"Ask"        },
  { id:"quiz",       icon:"🧠", label:"Quiz"       },
  { id:"roleplay",   icon:"🎭", label:"Roleplay"   },
  { id:"match",      icon:"🎯", label:"Match"      },
  { id:"compare",    icon:"⚖️",  label:"Compare"    },
  { id:"flashcards", icon:"🃏", label:"Cards"      },
  { id:"objections", icon:"🛡️", label:"Rebuttals"  },
];

function BottomNav({ tab, setTab }) {
  return (
    <div style={{ background:"white", borderTop:"1px solid #E4EBF5", flexShrink:0, boxShadow:"0 -2px 10px rgba(27,58,107,0.06)" }} className="flex">
      {TABS.map(t => (
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", paddingTop:"8px", paddingBottom:"8px", gap:"2px", border:"none", background:"none", cursor:"pointer" }}>
          <span style={{ fontSize:"18px", lineHeight:1, opacity: tab===t.id ? 1 : 0.35 }}>{t.icon}</span>
          <span style={{ fontSize:"9px", fontWeight: tab===t.id ? 700 : 500, color: tab===t.id ? "#1B3A6B" : "#94A3B8" }}>{t.label}</span>
          <div style={{ height:"2.5px", width: tab===t.id ? "20px" : "0px", background:"#1B3A6B", borderRadius:"2px", transition:"width 0.2s ease", marginTop:"1px" }} />
        </button>
      ))}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [started, setStarted] = useState(false);
  const [tab, setTab] = useState("ask");
  if (!started) return <SplashScreen onStart={() => setStarted(true)} />;
  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:"#f3f4f6" }}>
      {tab === "ask"        && <AskTab />}
      {tab === "quiz"       && <QuizTab />}
      {tab === "roleplay"   && <RoleplayTab />}
      {tab === "match"      && <MatchTab />}
      {tab === "compare"    && <CompareTab />}
      {tab === "flashcards" && <FlashcardsTab />}
      {tab === "objections" && <ObjectionTab />}
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
