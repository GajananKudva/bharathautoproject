// ── Groq — works in both Electron (IPC) and browser (web server proxy) ────────
async function callGroq(messages, maxTokens = 1024, temperature = 0.7) {
  if (window.electronAPI) {
    // Desktop app: key is in main.js, never in renderer
    const result = await window.electronAPI.callGroq(messages, maxTokens, temperature);
    if (!result.success) throw new Error(result.error);
    return result.content;
  } else {
    // Phone/browser: key is in server.js on the PC, never sent to the phone
    const res = await fetch('/api/groq', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, maxTokens, temperature })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    return data.content;
  }
}

// ── TAB 2 — Quiz ──────────────────────────────────────────────────────────────
function QuizTab() {
  const [car, setCar] = useState("All Cars");
  const [diff, setDiff] = useState("Medium");
  const [phase, setPhase] = useState("idle");
  const [qs, setQs] = useState([]);
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [score, setScore] = useState(0);
  const [hist, setHist] = useState([]);
  const [errMsg, setErrMsg] = useState("");

  async function gen() {
    setPhase("loading"); setErrMsg("");
    const scope = car==="All Cars"?"all the Maruti Suzuki Arena cars":`the ${car}`;
    const p = `Generate exactly 5 multiple choice quiz questions for a car salesperson training about ${scope}.\nDifficulty: ${diff}\nSource:\n${CAR_DATA}\nRules: test variant features, mileage figures, engine specs. 4 options (A B C D), one correct.\nReturn ONLY JSON array:\n[{"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","explanation":"..."}]`;
    try {
      const raw = await callGroq([{ role:"user", content:p }], 2048, 0.5);
      const m = raw.match(/\[[\s\S]*\]/);
      if (!m) throw new Error("No JSON — please try again");
      const parsed = JSON.parse(m[0]);
      if (!Array.isArray(parsed)||parsed.length<3) throw new Error("Too few questions — retry");
      setQs(parsed); setCur(0); setSel(null); setScore(0); setHist([]); setPhase("active");
    } catch(e) { setErrMsg(e.message); setPhase("idle"); }
  }

  function pick(opt) {
    if (sel) return;
    const ok = opt===qs[cur].answer;
    setSel(opt); if (ok) setScore(s=>s+1);
    setHist(h=>[...h,{ok,sel:opt}]);
  }
  function next() { if (cur+1>=qs.length){setPhase("done");return;} setCur(c=>c+1); setSel(null); }
  const scoreMsg = ["Don't give up! 💡","Keep going! 📚","Good effort! 💪","Getting there!","Great job! 🚀","Perfect! 🏆"];

  if (phase==="loading") return <div className="tab-content"><Header title="Quiz Me" /><div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"16px" }}><div className="spin w-12 h-12 border-4 rounded-full" style={{ borderColor:"#2E75B6", borderTopColor:"transparent" }} /><p className="font-medium" style={{ color:"#1B3A6B" }}>Generating quiz…</p></div></div>;

  if (phase==="done") return (
    <div className="tab-content"><Header title="Quiz Results" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-5">
        <div className="rounded-2xl p-5 text-white text-center mb-5" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
          <div className="text-5xl mb-2">{score===qs.length?"🏆":score>=3?"🚀":"📚"}</div>
          <div className="text-4xl font-bold">{score}/{qs.length}</div>
          <p className="text-sm mt-2 text-blue-100">{scoreMsg[Math.min(score,scoreMsg.length-1)]}</p>
        </div>
        <div className="space-y-3 mb-5">
          {qs.map((q,i) => (
            <div key={i} className={`rounded-xl p-3 border ${hist[i]?.ok?"bg-green-50 border-green-200":"bg-red-50 border-red-200"}`}>
              <div className="flex gap-2"><span>{hist[i]?.ok?"✅":"❌"}</span>
                <div><p className="text-xs font-semibold text-gray-700 mb-1">Q{i+1}: {q.question}</p>
                  {!hist[i]?.ok && <p className="text-xs text-red-600 mb-0.5">Your: {hist[i]?.sel}: {q.options[hist[i]?.sel]}</p>}
                  <p className="text-xs text-green-700">Correct: {q.answer}: {q.options[q.answer]}</p>
                  <p className="text-xs text-gray-400 mt-1 italic">{q.explanation}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
        <button onClick={() => setPhase("idle")} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>Try Another Quiz</button>
      </div>
    </div>
  );

  if (phase==="active") {
    const q = qs[cur];
    return (
      <div className="tab-content"><Header title="Quiz Me" />
        <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
          <div className="flex justify-between mb-2"><span className="text-xs text-gray-500">Q {cur+1}/{qs.length}</span><span className="text-xs font-bold" style={{ color:"#1B3A6B" }}>Score: {score}</span></div>
          <div className="h-2 bg-gray-100 rounded-full mb-3 overflow-hidden"><div className="h-2 rounded-full" style={{ width:`${(cur+1)/qs.length*100}%`, background:"#2E75B6" }} /></div>
          <div className="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-100"><p className="text-gray-800 font-semibold text-sm leading-relaxed">{q.question}</p></div>
          <div className="space-y-2.5 mb-4">
            {Object.entries(q.options).map(([lt,txt]) => {
              let bg="white",border="#e5e7eb",color="#374151";
              if (sel) { if(lt===q.answer){bg="#f0fdf4";border="#4ade80";color="#166534";}else if(lt===sel){bg="#fef2f2";border="#f87171";color="#991b1b";}else{bg="#f9fafb";color="#9ca3af";} }
              return <button key={lt} onClick={()=>pick(lt)} disabled={!!sel} className="w-full text-left rounded-xl px-4 py-3 text-sm flex items-center gap-3" style={{ background:bg, border:`1.5px solid ${border}`, color }}><span className="w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ borderColor:color }}>{lt}</span>{txt}</button>;
            })}
          </div>
          {sel && <div className={`rounded-xl p-3 mb-4 ${sel===q.answer?"bg-green-50 border border-green-200":"bg-amber-50 border border-amber-200"}`}><p className="text-xs font-semibold mb-1">{sel===q.answer?"✅ Correct!":"❌ Incorrect — Answer: "+q.answer}</p><p className="text-xs text-gray-600">{q.explanation}</p></div>}
          {sel && <button onClick={next} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>{cur+1>=qs.length?"See Results →":"Next →"}</button>}
        </div>
      </div>
    );
  }

  return (
    <div className="tab-content"><Header title="Quiz Me" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-5">
        <div className="text-center mb-5"><div className="text-4xl mb-1">🧠</div><h2 className="text-xl font-bold" style={{ color:"#1B3A6B" }}>Test Your Knowledge</h2><p className="text-gray-500 text-sm mt-1">5 MCQs from live car data</p></div>
        <div className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm space-y-4 mb-4">
          <div><label className="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Select Car</label>
            <select value={car} onChange={e=>setCar(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none">
              {["All Cars",...CAR_NAMES].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label className="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Difficulty</label>
            <div className="flex gap-2">
              {["Easy","Medium","Hard"].map(d=><button key={d} onClick={()=>setDiff(d)} className="flex-1 py-2.5 rounded-xl text-sm font-semibold border" style={diff===d?{background:d==="Easy"?"#22c55e":d==="Medium"?"#eab308":"#ef4444",color:"white",border:"none"}:{background:"#f9fafb",color:"#6b7280",border:"1.5px solid #e5e7eb"}}>{d}</button>)}
            </div>
          </div>
        </div>
        {errMsg && <div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700">{errMsg}</div>}
        <button onClick={gen} className="w-full text-white py-4 rounded-xl font-bold text-base shadow-md" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>Generate Quiz 🎯</button>
      </div>
    </div>
  );
}

    sysRef.current = sys;
    try {
      const reply = await callGroq([{ role:"system",content:sys },{ role:"user",content:"Start the roleplay now. Greet the salesperson." }], 400, 0.85);

    setInput("");

        <div className="space-y-2.5 mb-4">
          {PROFILES.map(p=>(
            <button key={p.title} onClick={()=>start(`${p.icon} ${p.title}: ${p.desc}`)} className="w-full bg-white border border-gray-200 rounded-2xl p-4 text-left hover:shadow-sm transition-all flex items-center gap-3">
              <span className="text-2xl">{p.icon}</span>
              <div><p className="font-semibold text-sm" style={{ color:"#1B3A6B" }}>{p.title}</p><p className="text-gray-500 text-xs">{p.desc}</p></div>
              <span className="ml-auto text-gray-300 text-lg">›</span>
            </button>
          ))}
        </div>
        <div className="bg-white border border-gray-200 rounded-2xl p-4">
          <p className="text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Custom Profile</p>
          <textarea value={custom} onChange={e=>setCustom(e.target.value)} rows={3} placeholder="e.g. Retired couple, budget ₹15L, wants comfortable sedan for long drives…" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none resize-none bg-gray-50" />
          <button onClick={()=>custom.trim()&&start(custom.trim())} disabled={!custom.trim()} className="mt-2 w-full text-white py-2.5 rounded-xl text-sm font-semibold disabled:opacity-40" style={{ background:"#2E75B6" }}>Start with Custom Profile</button>
        </div>
      </div>
    </div>
  );
}

// ── TAB 4 — Match a Customer ──────────────────────────────────────────────────
function MatchTab() {
  const [form, setForm] = useState({ budget:"₹8–10L", family:"3–4", use:"City commute", fuel:"No preference", tx:"No preference", feature:"" });
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [err, setErr] = useState("");

  const Chips = ({ label, field, opts }) => (
    <div><p className="text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">{label}</p>
      <div className="flex flex-wrap gap-1.5">
        {opts.map(o=><button key={o} onClick={()=>setForm(f=>({...f,[field]:o}))} className="text-xs px-3 py-1.5 rounded-full border font-medium" style={form[field]===o?{background:"#1B3A6B",color:"white",borderColor:"#1B3A6B"}:{background:"#f9fafb",color:"#4b5563",borderColor:"#e5e7eb"}}>{o}</button>)}
      </div>
    </div>
  );

  async function find() {
    setLoading(true); setErr(""); setResults(null);
    const p = `Match best Maruti Suzuki Arena cars.\nCustomer: Budget ${form.budget}, Family ${form.family}, Use: ${form.use}, Fuel: ${form.fuel}, Transmission: ${form.tx}, Must-have: ${form.feature||"none"}\nCars:\n${CAR_DATA}\nReturn ONLY JSON:\n{"recommendations":[{"car":"...","variant":"...","reasons":["...","...","..."],"match_score":90,"price_range":"₹X–Y lakh approx"}],"alternative":{"car":"...","variant":"...","reason":"..."},"sales_tip":"..."}`;
    try {
      const raw = await callGroq([{ role:"user",content:p }], 1500, 0.4);
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("Could not parse — retry");
      setResults(JSON.parse(m[0]));
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }

  if (results) return (
    <div className="tab-content"><Header title="Match a Customer" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        <div className="flex items-center justify-between mb-3"><h2 className="text-base font-bold" style={{ color:"#1B3A6B" }}>Recommended Cars</h2><button onClick={()=>setResults(null)} className="text-xs font-medium" style={{ color:"#2E75B6" }}>← New Search</button></div>
        <div className="space-y-3 mb-3">
          {results.recommendations?.map((r,i)=>(
            <div key={i} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
              <div className="flex items-start justify-between mb-2">
                <div><div className="flex items-center gap-2 mb-1"><span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background:i===0?"#1B3A6B":"#f3f4f6", color:i===0?"white":"#4b5563" }}>#{i+1} {i===0?"Best Match":"Good Fit"}</span>{r.match_score&&<span className="text-xs font-semibold text-green-600">{r.match_score}%</span>}</div>
                  <h3 className="text-base font-bold" style={{ color:"#1B3A6B" }}>{r.car}</h3><p className="text-sm font-medium" style={{ color:"#2E75B6" }}>{r.variant}</p>
                </div><span className="text-2xl">{i===0?"🥇":i===1?"🥈":"🥉"}</span>
              </div>
              {r.price_range&&<p className="text-xs text-gray-500 bg-gray-50 px-2 py-1 rounded-lg inline-block mb-2">{r.price_range}</p>}
              <div className="space-y-1.5">{r.reasons?.map((rr,j)=><p key={j} className="text-xs text-gray-700 flex gap-2"><span className="text-green-500 font-bold">✓</span>{rr}</p>)}</div>
            </div>
          ))}
        </div>
        {results.alternative&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-3"><p className="text-amber-800 font-semibold text-sm mb-1">💡 Alternative</p><p className="text-amber-700 text-sm font-medium">{results.alternative.car} — {results.alternative.variant}</p><p className="text-amber-600 text-xs mt-1">{results.alternative.reason}</p></div>}
        {results.sales_tip&&<div className="rounded-2xl p-4 mb-4" style={{ background:"#1B3A6B" }}><p className="text-blue-200 text-xs font-semibold mb-1">🎯 SALES TIP</p><p className="text-white text-sm">{results.sales_tip}</p></div>}
        <button onClick={()=>setResults(null)} className="w-full py-3 rounded-xl font-semibold text-sm border-2" style={{ borderColor:"#1B3A6B", color:"#1B3A6B", background:"transparent" }}>Search Again</button>
      </div>
    </div>
  );

  return (
    <div className="tab-content"><Header title="Match a Customer" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-4">
        <div className="text-center mb-4"><div className="text-3xl mb-1">🎯</div><h2 className="text-lg font-bold" style={{ color:"#1B3A6B" }}>Find the Perfect Car</h2><p className="text-gray-500 text-xs mt-1">AI-matched recommendations in seconds</p></div>
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 space-y-4 mb-4">
          <Chips label="Budget Range" field="budget" opts={["Under ₹6L","₹6–8L","₹8–10L","₹10–12L","₹12–15L","Above ₹15L"]} />
          <Chips label="Family Size" field="family" opts={["1–2","3–4","5+","Commercial use"]} />
          <Chips label="Primary Use" field="use" opts={["City commute","Highway","Mixed","Off-road/hills"]} />
          <Chips label="Fuel Preference" field="fuel" opts={["Petrol","CNG","No preference"]} />
          <Chips label="Transmission" field="tx" opts={["Manual","Automatic","No preference"]} />
          <div><p className="text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Must-Have Feature (optional)</p>
            <input value={form.feature} onChange={e=>setForm(f=>({...f,feature:e.target.value}))} placeholder="e.g. sunroof, Apple CarPlay, 7 seats…" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none bg-gray-50" />
          </div>
        </div>
        {err&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700">{err}</div>}
        <button onClick={find} disabled={loading} className="w-full text-white py-4 rounded-xl font-bold text-base shadow-md flex items-center justify-center gap-2 disabled:opacity-60" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>{loading?<><Spinner />Finding Best Match…</>:"Find Best Match 🎯"}</button>
      </div>
    </div>
  );
}

// ── TAB 5 — Side-by-Side Compare ──────────────────────────────────────────────
const SPEC_ROWS = [
  { label:"Body Type",       key:"body" },
  { label:"Engine",          key:"engine" },
  { label:"Power",           key:"power" },
  { label:"Torque",          key:"torque" },
  { label:"Mileage (MT)",    key:"petrolMT" },
  { label:"Mileage (Auto)",  key:"petrolAuto" },
  { label:"CNG Mileage",     key:"cng" },
  { label:"Fuel Tank",       key:"tank" },
  { label:"Boot Space",      key:"boot" },
  { label:"Seating",         key:"seats" },
  { label:"Airbags",         key:"airbags" },
  { label:"Segment",         key:"segment" },
  { label:"Top Variant",     key:"topVariant" },
];

function CompareTab() {
  const [car1, setCar1] = useState("Swift");
  const [car2, setCar2] = useState("Dzire");
  const [showAI, setShowAI] = useState(false);
  const [aiText, setAiText] = useState("");
  const [loadingAI, setLoadingAI] = useState(false);

  const c1 = CARS_STRUCTURED[car1];
  const c2 = CARS_STRUCTURED[car2];

  async function getAIAnalysis() {
    setLoadingAI(true); setShowAI(true); setAiText("");
    const p = `Compare ${car1} and ${car2} for a Maruti Suzuki Arena salesperson.\nCar data:\n${CAR_DATA}\nGive a concise comparison in 4-5 bullet points: who each car is best for, key differences, and which to recommend to which type of customer. Keep it practical for a sales floor conversation.`;
    try {
      const reply = await callGroq([{ role:"user", content:p }], 600, 0.6);
      setAiText(reply);
    } catch(e) { setAiText("Error: "+e.message); }
    setLoadingAI(false);
  }

  const sameCarSelected = car1 === car2;

  return (
    <div className="tab-content">
      <Header title="Side-by-Side Compare" />
      <div style={{ flex:1, overflowY:"auto", background:"#f9fafb" }} className="px-4 py-4">

        {/* Car selectors */}
        <div className="grid grid-cols-2 gap-3 mb-4">
          {[[car1,setCar1,"Car 1"],[car2,setCar2,"Car 2"]].map(([val,setter,label])=>(
            <div key={label}>
              <p className="text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">{label}</p>
              <select value={val} onChange={e=>{ setter(e.target.value); setShowAI(false); setAiText(""); }} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none font-semibold" style={{ color:"#1B3A6B" }}>
                {CAR_NAMES.map(n=><option key={n}>{n}</option>)}
              </select>
            </div>
          ))}
        </div>

        {sameCarSelected && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-xs text-amber-700 text-center">Please select two different cars to compare</div>
        )}

        {!sameCarSelected && (
          <>
            {/* Header row */}
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-3">
              <div className="grid grid-cols-3 border-b border-gray-100">
                <div className="p-3 bg-gray-50" />
                <div className="p-3 text-center border-l border-gray-100" style={{ background:"#eef2f9" }}>
                  <p className="text-xs font-bold" style={{ color:"#1B3A6B" }}>{car1}</p>
                </div>
                <div className="p-3 text-center border-l border-gray-100" style={{ background:"#eef2f9" }}>
                  <p className="text-xs font-bold" style={{ color:"#1B3A6B" }}>{car2}</p>
                </div>
              </div>
              <table className="cmp-table">
                <tbody>
                  {SPEC_ROWS.map(row => {
                    const v1 = c1[row.key] || "—";
                    const v2 = c2[row.key] || "—";
                    const diff = v1 !== v2;
                    return (
                      <tr key={row.key}>
                        <th>{row.label}</th>
                        <td className={`cmp-cell ${diff?"cmp-diff":""}`} style={{ color:"#1f2937" }}>{v1}</td>
                        <td className={`cmp-cell ${diff?"cmp-diff":""} border-l border-gray-50`} style={{ color:"#1f2937" }}>{v2}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="px-3 pb-2 pt-1">
                <p className="text-[10px] text-amber-600">🟡 Highlighted rows = values differ between the two cars</p>
              </div>
            </div>

            {/* Key features */}
            <div className="grid grid-cols-2 gap-3 mb-4">
              {[{name:car1,data:c1},{name:car2,data:c2}].map(({name,data})=>(
                <div key={name} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-3">
                  <p className="text-xs font-bold mb-2" style={{ color:"#1B3A6B" }}>⭐ {name} highlights</p>
                  <p className="text-xs text-gray-600 leading-relaxed">{data.topFeatures}</p>
                </div>
              ))}
            </div>

            {/* AI Analysis */}
            {!showAI && (
              <button onClick={getAIAnalysis} className="w-full text-white py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
                🤖 Get AI Sales Analysis
              </button>
            )}
            {showAI && (
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                <p className="text-xs font-bold mb-2" style={{ color:"#1B3A6B" }}>🤖 AI Sales Analysis — {car1} vs {car2}</p>
                {loadingAI
                  ? <div className="flex items-center gap-2 py-2"><Spinner small /><span className="text-xs text-gray-500">Analyzing…</span></div>
                  : <p className="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap">{aiText}</p>
                }
                <button onClick={()=>{setShowAI(false);setAiText("");}} className="mt-3 text-xs text-gray-400 underline">Dismiss</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── TAB 6 — Feature Flashcards ────────────────────────────────────────────────
function FlashcardsTab() {
  const [selectedCar, setSelectedCar] = useState("Swift");
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [review, setReview] = useState(new Set());
  const [phase, setPhase] = useState("study"); // study | summary

  const deck = FLASHCARD_DECKS[selectedCar] || [];
  const card = deck[cardIdx];
  const total = deck.length;
  const knownCount = known.size;
  const reviewCount = review.size;

  function changeCar(c) {
    setSelectedCar(c);
    setCardIdx(0);
    setFlipped(false);
    setKnown(new Set());
    setReview(new Set());
    setPhase("study");
  }

  function markKnown() {
    setKnown(s => new Set([...s, cardIdx]));
    review.has(cardIdx) && setReview(s => { const n=new Set(s); n.delete(cardIdx); return n; });
    advance();
  }

  function markReview() {
    setReview(s => new Set([...s, cardIdx]));
    known.has(cardIdx) && setKnown(s => { const n=new Set(s); n.delete(cardIdx); return n; });
    advance();
  }

  function advance() {
    setFlipped(false);
    setTimeout(() => {
      if (cardIdx + 1 >= total) { setPhase("summary"); }
      else { setCardIdx(i => i+1); }
    }, 200);
  }

  function restart(reviewOnly=false) {
    if (reviewOnly && review.size > 0) {
      // rebuild deck with only review cards — for simplicity, just go to first review card
      const firstReview = [...review].sort((a,b)=>a-b)[0];
      setCardIdx(firstReview);
    } else {
      setCardIdx(0);
    }
    setFlipped(false);
    setKnown(new Set());
    setReview(new Set());
    setPhase("study");
  }

  if (phase==="summary") return (
    <div className="tab-content"><Header title="Flashcards" />
      <div style={{ flex:1, overflowY:"auto" }} className="px-4 py-6">
        <div className="rounded-2xl p-5 text-white text-center mb-5" style={{ background:"linear-gradient(135deg,#1B3A6B,#2E75B6)" }}>
          <div className="text-5xl mb-2">{knownCount===total?"🏆":knownCount>=total*0.7?"🎉":"📖"}</div>
          <p className="text-blue-200 text-sm mb-1">{selectedCar} Flashcards</p>
          <div className="flex justify-center gap-6 mt-3">
            <div className="text-center"><p className="text-2xl font-bold text-green-300">{knownCount}</p><p className="text-xs text-blue-200">Got it ✓</p></div>
            <div className="text-center"><p className="text-2xl font-bold text-amber-300">{reviewCount}</p><p className="text-xs text-blue-200">Review again</p></div>
          </div>
          <p className="text-blue-100 text-sm mt-3">{knownCount===total?"Perfect! You know this car cold 🔥":knownCount>=total*0.7?"Great progress! Review the remaining cards":"Keep practising — you'll get there!"}</p>
        </div>
        <div className="space-y-3 mb-5">
          <button onClick={()=>restart(false)} className="w-full text-white py-3 rounded-xl font-semibold text-sm" style={{ background:"#1B3A6B" }}>Restart Deck</button>
          {reviewCount > 0 && <button onClick={()=>restart(true)} className="w-full py-3 rounded-xl font-semibold text-sm border-2" style={{ borderColor:"#1B3A6B", color:"#1B3A6B" }}>Drill {reviewCount} Review Cards</button>}
          <button onClick={()=>changeCar(selectedCar)} className="w-full py-3 rounded-xl font-semibold text-sm border border-gray-200 text-gray-500">Pick Another Car</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="tab-content">
      <Header title="Feature Flashcards" />
      <div style={{ flex:1, overflowY:"auto", background:"#f9fafb" }} className="px-4 py-4">

        {/* Car picker */}
        <div className="mb-4">
          <select value={selectedCar} onChange={e=>changeCar(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none font-semibold" style={{ color:"#1B3A6B" }}>
            {CAR_NAMES.map(n=><option key={n}>{n}</option>)}
          </select>
        </div>

        {/* Progress bar */}
        <div className="flex items-center justify-between mb-1.5">
          <span className="text-xs text-gray-500 font-medium">Card {cardIdx+1} of {total}</span>
          <div className="flex gap-2 text-xs">
            <span className="text-green-600 font-semibold">✓ {knownCount}</span>
            <span className="text-amber-500 font-semibold">↺ {reviewCount}</span>
          </div>
        </div>
        <div className="h-2 bg-gray-200 rounded-full mb-4 overflow-hidden">
          <div className="h-2 rounded-full transition-all" style={{ width:`${(cardIdx+1)/total*100}%`, background:"linear-gradient(to right, #22c55e, #2E75B6)" }} />
        </div>

        {/* Flip card */}
        <div className="flip-scene mb-4" onClick={()=>setFlipped(f=>!f)}>
          <div className={`flip-card ${flipped?"flipped":""}`}>
            {/* Front */}
            <div className="flip-face flip-front">
              <p className="text-[10px] text-gray-400 font-semibold uppercase tracking-widest mb-3">Tap to reveal answer</p>
              <p className="text-gray-800 font-semibold text-base text-center leading-relaxed">{card?.q}</p>
            </div>
            {/* Back */}
            <div className="flip-face flip-back">
              <p className="text-[10px] text-blue-300 font-semibold uppercase tracking-widest mb-3">Answer</p>
              <p className="text-white font-bold text-lg text-center leading-relaxed">{card?.a}</p>
            </div>
          </div>
        </div>

        <p className="text-center text-xs text-gray-400 mb-4">{flipped?"How well did you know this?":"Tap the card to reveal the answer"}</p>

        {/* Action buttons — only show after flip */}
        {flipped && (
          <div className="grid grid-cols-2 gap-3">
            <button onClick={markReview} className="py-3 rounded-xl font-semibold text-sm border-2 flex items-center justify-center gap-2" style={{ borderColor:"#f59e0b", color:"#b45309", background:"#fffbeb" }}>
              ↺ Review Again
            </button>
            <button onClick={markKnown} className="py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 text-white" style={{ background:"#16a34a" }}>
              ✓ Got It!
            </button>
          </div>
        )}

        {/* Card dots navigator */}
        <div className="flex justify-center gap-1 mt-4 flex-wrap">
          {deck.map((_,i) => (
            <div key={i} onClick={()=>{setCardIdx(i);setFlipped(false);}} className="w-2.5 h-2.5 rounded-full cursor-pointer transition-all"
              style={{ background: known.has(i)?"#22c55e":review.has(i)?"#f59e0b":i===cardIdx?"#1B3A6B":"#d1d5db" }} />
          ))}
        </div>
        <p className="text-center mt-1.5 text-[10px] text-gray-400">🟢 Known · 🟡 Review · 🔵 Current · ⚪ Unseen</p>
      </div>
    </div>
  );
}

// ── Bottom Nav (6 tabs) ────────────────────────────────────────────────────────
const TABS = [
  { id:"ask",       icon:"🔍", label:"Ask" },
  { id:"quiz",      icon:"🧠", label:"Quiz" },
  { id:"roleplay",  icon:"🎭", label:"Roleplay" },
  { id:"match",     icon:"🎯", label:"Match" },
  { id:"compare",   icon:"⚖️", label:"Compare" },
  { id:"flashcards",icon:"🃏", label:"Flashcards" },
];

function BottomNav({ active, onChange }) {
  return (
    <div className="bg-white border-t border-gray-200 flex" style={{ flexShrink:0 }}>
      {TABS.map(t => (
        <button key={t.id} onClick={()=>onChange(t.id)} className="flex-1 flex flex-col items-center py-2 gap-0.5 transition-colors" style={{ color:active===t.id?"#1B3A6B":"#9ca3af" }}>
          <span style={{ fontSize:"18px" }}>{t.icon}</span>
          <span style={{ fontSize:"9px", fontWeight:600 }}>{t.label}</span>
          {active===t.id && <div className="w-1 h-1 rounded-full" style={{ background:"#1B3A6B" }} />}
        </button>
      ))}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────
function App() {
  const [started, setStarted] = useState(false);
  const [tab, setTab] = useState("ask");
  if (!started) return <SplashScreen onStart={()=>setStarted(true)} />;
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", maxWidth:"480px", margin:"0 auto", background:"#f9fafb" }}>
      <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
        {tab==="ask"        && <AskTab />}
        {tab==="quiz"       && <QuizTab />}
        {tab==="roleplay"   && <RoleplayTab />}
        {tab==="match"      && <MatchTab />}
        {tab==="compare"    && <CompareTab />}
        {tab==="flashcards" && <FlashcardsTab />}
      </div>
      <BottomNav active={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
